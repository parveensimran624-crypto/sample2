            
<!DOCTYPE html>
<html>
<head>
    <title>Typeahead.js example</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery (Required for Typeahead) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Typeahead.js -->
    <script src="https://twitter.github.io/typeahead.js/releases/latest/typeahead.bundle.js"></script>

    <style>
        body{
            padding:40px;
        }

        .tt-menu{
            width: 100%;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 5px;
        }

        .tt-suggestion{
            padding: 5px 15px;
            cursor: pointer;
        }

        .tt-suggestion:hover{
            background-color: rgb(19, 19, 89);
            color:white;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="mb-4">Typeahead.js autocomplete example</h1>

        <!-- FIXED input -->
        <input type="text" id="search-box" class="form-control" placeholder="U.S. state...">
    </div>

    <script>
        $(document).ready(function() {

            var states = [
                "Alabama", "Alaska", "Arizona", "Arkansas", "California", 
                "Colorado", "Connecticut", "Delaware", "Florida", "Georgia", 
                "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", 
                "Kentucky", "Louisiana", "Maine", "Maryland", "Massachusetts",
                "Michigan", "Minnesota", "Mississippi", "Missouri", "Montana",
                "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico",
                "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma",
                "Oregon", "Pennsylvania", "Rhode Island", "South Carolina", 
                "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", "Virginia",
                "Washington", "West Virginia", "Wisconsin", "Wyoming"
            ];

            var stateSuggestions = new Bloodhound({
                datumTokenizer: Bloodhound.tokenizers.whitespace,
                queryTokenizer: Bloodhound.tokenizers.whitespace,
                local: states
            });

            $('#search-box').typeahead(
                {
                    hint: true,
                    highlight: true,
                    minLength: 1
                },
                {
                    name: 'states',
                    source: stateSuggestions
                }
            );
        });
    </script>
</body>
</html>
